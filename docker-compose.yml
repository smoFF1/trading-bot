services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:latest
    container_name: ib-gateway
    environment:
      - TWS_USERID=${IBKR_USER}
      - TWS_PASSWORD=${IBKR_PASSWORD}
      - TRADING_MODE=paper
      - TWS_ACCEPT_INCOMING=127.0.0.1,172.0.0.0/8
    ports:
      - "7497:7497"
    restart: always

  trading-bot:
    build: .
    container_name: trading-bot
    depends_on:
      - ib-gateway
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - IBKR_HOST=ib-gateway
      - IBKR_PORT=7497
    volumes:
      - .:/app
    restart: always                                   